name: Validate core presentation domain

on:
  push:
    branches: [main]
    paths:
      - .agent/validate-core-presentation-domain

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate presentation domain
        shell: bash
        run: |
          set -o pipefail
          {
          set -euo pipefail
          npm run release:manifest
          node --check src/core-domains/core-presentation-domain/index.js
          node --check src/core-kits/core-presentation-output-kit/index.js
          node --check src/core-kits/core-ui-scale-kit/index.js
          node --check src/core-kits/core-camera-framing-kit/index.js
          node --check src/hosts/browser/browser-presentation-surface-adapter.js
          node --check src/renderers/three/three-presentation-output-adapter.js
          node --check src/renderers/three/three-subject-bounds-adapter.js
          node tests/core-kits/core-presentation-domain-smoke.mjs
          node tests/public-api-freeze.mjs
          node tests/core-capability-domain-barrels-smoke.mjs
          npm test
          if ! grep -q '^## Optional Core Presentation Domain' README.md; then
            cat >> README.md <<'MD'

          ## Optional Core Presentation Domain

          Visual hosts can opt into `n:presentation` for renderer-neutral viewport policy, safe-area handling, UI scale, and subject framing. It is recommended for browser and native visual templates but is not installed automatically into headless runtimes. See `docs/CORE_PRESENTATION_DOMAIN.md`.
          MD
          fi
          } 2>&1 | tee /tmp/core-presentation-validation.log
      - name: Commit generated documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .agent/core-presentation-validation-error.log
          git add docs/DSK_MANIFEST_0.0.3.json README.md .agent/core-presentation-validation-error.log 2>/dev/null || git add docs/DSK_MANIFEST_0.0.3.json README.md
          git commit -m "Validate and document core presentation domain" || true
          git push origin HEAD:main
      - name: Record failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp /tmp/core-presentation-validation.log .agent/core-presentation-validation-error.log 2>/dev/null || echo "validation failed before log capture" > .agent/core-presentation-validation-error.log
          git add .agent/core-presentation-validation-error.log
          git commit -m "Record core presentation validation failure" || true
          git push origin HEAD:main || true
