name: Apply procedural material upgrade

on:
  push:
    branches: [main]
    paths:
      - ".upgrade/procedural-material/**"
      - ".github/workflows/apply-procedural-material-upgrade.yml"

permissions:
  contents: write

concurrency:
  group: apply-procedural-material-upgrade
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Apply prepared files
        shell: bash
        run: |
          set -euo pipefail
          cat .upgrade/procedural-material/part-* | base64 --decode > /tmp/procedural-material.tar.gz
          mkdir -p /tmp/procedural-material
          tar -xzf /tmp/procedural-material.tar.gz -C /tmp/procedural-material
          cp -R /tmp/procedural-material/NexusEngine/. ./
          rm -rf .upgrade/procedural-material
          rm -f .github/workflows/apply-procedural-material-upgrade.yml

      - name: Validate NexusEngine
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run test:release

      - name: Commit upgrade to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat(graphics): add procedural triplanar material contracts"
          git push origin HEAD:main
