name: Export procedural navigation extensions

on:
  push:
    branches: [main]
    paths:
      - .agent/export-procedural-navigation-extensions

permissions:
  contents: write

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Export extension barrel
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/index.js')
          text = path.read_text()
          line = 'export * from "./procedural-navigation-extensions.js";\n'
          if line not in text:
              marker = 'export * from "./common-game-definitions.js";\n'
              if text.count(marker) != 1:
                  raise SystemExit(f'common definitions marker count {text.count(marker)}')
              text = text.replace(marker, marker + line, 1)
              path.write_text(text)
          PY
          node --check src/index.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/index.js
          git commit -m "Expose procedural navigation extension kits" || true
          git push origin HEAD:main
