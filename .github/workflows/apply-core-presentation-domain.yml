          const second = framing.update({
            subjectBounds: { minimum: [-4, 0, -1], maximum: [4, 2.5, 1] },
            viewport: { width: 720, height: 1280 },
            camera: { projection: "perspective", verticalFov: 42 },
            deltaTime: 1 / 60
          });
          assert.equal(second.status, "damping");
          const ortho = engine.n.cameraFraming.create({ id: "ortho" }).update({
            subjectBounds: { minimum: [-1, -1, -1], maximum: [1, 1, 1] },
            viewport: { width: 800, height: 600 },
            camera: { projection: "orthographic" },
            deltaTime: 1 / 60
          });
          assert.equal(ortho.projection, "orthographic");
          assert.ok(ortho.orthographicHeight > 0);

          const fakeElement = {
            clientWidth: 640,
            clientHeight: 360,
            getBoundingClientRect: () => ({ width: 640, height: 360 })
          };
          const surfaceAdapter = createBrowserPresentationSurfaceAdapter({
            element: fakeElement,
            autoStart: false,
            window: null,
            document: null
          });
          assert.equal(surfaceAdapter.measure().orientation, "landscape");

          const calls = [];
          const renderer = {
            domElement: { style: {} },
            setPixelRatio: (value) => calls.push(["pixelRatio", value]),
            setSize: (...args) => calls.push(["size", ...args]),
            setScissorTest: (value) => calls.push(["scissorTest", value]),
            setViewport: (...args) => calls.push(["viewport", ...args]),
            setScissor: (...args) => calls.push(["scissor", ...args]),
            setClearColor: (...args) => calls.push(["clearColor", ...args]),
            clear: () => calls.push(["clear"])
          };
          const camera = { aspect: 0, updateProjectionMatrix: () => calls.push(["projection"]) };
          createThreePresentationOutputAdapter().apply({ renderer, camera, descriptor });
          assert.equal(camera.aspect, descriptor.cameraAspect);
          assert.ok(calls.some(([name]) => name === "viewport"));

          const snapshot = output.getSnapshot();
          output.reset();
          output.loadSnapshot(snapshot);
          assert.equal(output.getDescriptor().frame.mode, "contain");

          console.log("core presentation domain smoke ok");
          JS

          cat > scripts/generate-dsk-manifest.mjs <<'JS'
          import { writeFileSync } from "node:fs";
          import { dirname, resolve } from "node:path";
          import { fileURLToPath } from "node:url";
          import { NEXUS_ENGINE_VERSION, NEXUS_ENGINE_STABILITY } from "../src/release.js";

          const __dirname = dirname(fileURLToPath(import.meta.url));
          const root = resolve(__dirname, "..");

          const coreDomains = [
            "core-data", "core-persistence", "core-assets", "core-platform", "core-input", "core-spatial",
            "core-scene", "core-physics", "core-motion", "core-simulation", "core-interaction", "core-graphics",
            "core-camera", "core-animation", "core-audio", "core-ui", "core-network", "core-diagnostics",
            "core-policy", "core-composition", "core-mlnn", "core-agent"
          ].map((domain) => ({
            id: `n-${domain}-kit`,
            domain,
            provides: [`n:${domain}`],
            source: `src/core-kits/${domain}-kit/index.js`
          }));

          const presentationDomains = [
            { id: "core-presentation-domain", domain: "presentation", provides: ["n:presentation"], source: "src/core-kits/core-presentation-kit/index.js" },
            { id: "core-presentation-output-kit", domain: "presentation-output", provides: ["n:presentation:output"], source: "src/core-kits/core-presentation-output-kit/index.js" },
            { id: "core-ui-scale-kit", domain: "presentation-ui-scale", provides: ["n:presentation:ui-scale"], source: "src/core-kits/core-ui-scale-kit/index.js" },
            { id: "core-camera-framing-kit", domain: "presentation-camera-framing", provides: ["n:presentation:camera-framing"], source: "src/core-kits/core-camera-framing-kit/index.js" }
          ];

          const manifest = {
            schema: "nexusengine.dsk-manifest.v0.0.3",
            package: "nexusengine",
            version: NEXUS_ENGINE_VERSION,
            stability: NEXUS_ENGINE_STABILITY,
            generatedBy: "scripts/generate-dsk-manifest.mjs",
            domains: [...coreDomains, ...presentationDomains].map((entry) => ({
              ...entry,
              stability: "stable-candidate",
              version: NEXUS_ENGINE_VERSION,
              snapshot: "required",
              reset: "required"
            }))
          };

          const outputPath = resolve(root, "docs", "DSK_MANIFEST_0.0.3.json");
          writeFileSync(outputPath, `${JSON.stringify(manifest, null, 2)}\n`);
          console.log(`Wrote ${outputPath}`);
          JS

          python - <<'PY'
          import json
          from pathlib import Path

          def replace_once(path, old, new, label):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              path.write_text(text.replace(old, new, 1))

          replace_once(
              Path('src/core-kits/index.js'),
              'export * from "./core-camera-kit/index.js";\n',
              'export * from "./core-camera-kit/index.js";\nexport * from "./core-presentation-kit/index.js";\nexport * from "./core-presentation-output-kit/index.js";\nexport * from "./core-ui-scale-kit/index.js";\nexport * from "./core-camera-framing-kit/index.js";\n',
              'core kit barrels'
          )
          replace_once(
              Path('src/core-domains/index.js'),
              'export * from "./core-world-domain/index.js";\n',
              'export * from "./core-world-domain/index.js";\nexport * from "./core-presentation-domain/index.js";\n',
              'core domain barrel'
          )
          replace_once(
              Path('src/index.js'),
              'export { createCoreCameraKit } from "./core-kits/core-camera-kit/index.js";\n',
              'export { createCoreCameraKit } from "./core-kits/core-camera-kit/index.js";\nexport { createCorePresentationKit } from "./core-kits/core-presentation-kit/index.js";\nexport * from "./core-kits/core-presentation-output-kit/index.js";\nexport * from "./core-kits/core-ui-scale-kit/index.js";\nexport * from "./core-kits/core-camera-framing-kit/index.js";\n',
              'root presentation kit exports'
          )
          replace_once(
              Path('src/index.js'),
              'export * from "./core-domains/index.js";\n',
              'export * from "./core-domains/index.js";\nexport * from "./hosts/browser/browser-presentation-surface-adapter.js";\nexport * from "./renderers/three/three-presentation-output-adapter.js";\nexport * from "./renderers/three/three-subject-bounds-adapter.js";\n',
              'root adapter exports'
          )

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['exports']['./hosts/browser/presentation-surface'] = './src/hosts/browser/browser-presentation-surface-adapter.js'
          package['exports']['./renderers/three/presentation-output'] = './src/renderers/three/three-presentation-output-adapter.js'
          package['exports']['./renderers/three/subject-bounds'] = './src/renderers/three/three-subject-bounds-adapter.js'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          freeze = Path('tests/public-api-freeze.mjs')
          replace_once(
              freeze,
              '  "createCoreCameraKit",\n',
              '  "createCoreCameraKit",\n  "createCorePresentationKit",\n  "createCorePresentationOutputKit",\n  "createCoreUIScaleKit",\n  "createCoreCameraFramingKit",\n  "createCorePresentationDomain",\n  "createBrowserPresentationSurfaceAdapter",\n  "createThreePresentationOutputAdapter",\n  "getThreeSubjectBounds",\n',
              'public API freeze'
          )

          barrels = Path('tests/core-capability-domain-barrels-smoke.mjs')
          replace_once(
              barrels,
              '  createCoreCameraKit,\n',
              '  createCoreCameraKit,\n  createCorePresentationKit,\n  createCorePresentationOutputKit,\n  createCoreUIScaleKit,\n  createCoreCameraFramingKit,\n',
              'barrel imports'
          )
          replace_once(
              barrels,
              '  createCoreCameraKit,\n  createCoreAnimationKit,',
              '  createCoreCameraKit,\n  createCorePresentationKit,\n  createCorePresentationOutputKit,\n  createCoreUIScaleKit,\n  createCoreCameraFramingKit,\n  createCoreAnimationKit,',
              'barrel factories'
          )
          replace_once(
              barrels,
              '  "coreCamera",\n  "coreAnimation",',
              '  "coreCamera",\n  "corePresentation",\n  "presentationOutput",\n  "uiScale",\n  "cameraFraming",\n  "coreAnimation",',
              'barrel namespaces'
          )

          run_all = Path('tests/run-all.mjs')
          replace_once(
              run_all,
              '  "tests/core-kits/core-debug-kit-smoke.mjs",\n',
              '  "tests/core-kits/core-debug-kit-smoke.mjs",\n  "tests/core-kits/core-presentation-domain-smoke.mjs",\n',
              'run-all presentation smoke'
          )

          readme = Path('README.md')
          text = readme.read_text()
          marker = '\n## Optional Core Presentation Domain\n'
          if marker not in text:
              text += '''\n## Optional Core Presentation Domain\n\nVisual hosts can opt into `n:presentation` for renderer-neutral viewport policy, safe-area handling, UI scale, and subject framing. It is included by visual templates, but it is not installed automatically into headless runtimes. See `docs/CORE_PRESENTATION_DOMAIN.md`.\n'''
              readme.write_text(text)
          PY

          npm run release:manifest

          node --check src/core-domains/core-presentation-domain/contracts.js
          node --check src/core-domains/core-presentation-domain/index.js
          node --check src/core-kits/core-presentation-kit/index.js
          node --check src/core-kits/core-presentation-output-kit/math.js
          node --check src/core-kits/core-presentation-output-kit/index.js
          node --check src/core-kits/core-ui-scale-kit/math.js
          node --check src/core-kits/core-ui-scale-kit/index.js
          node --check src/core-kits/core-camera-framing-kit/perspective-fit.js
          node --check src/core-kits/core-camera-framing-kit/orthographic-fit.js
          node --check src/core-kits/core-camera-framing-kit/index.js
          node --check src/hosts/browser/browser-presentation-surface-adapter.js
          node --check src/renderers/three/three-presentation-output-adapter.js
          node --check src/renderers/three/three-subject-bounds-adapter.js
          node tests/core-kits/core-presentation-domain-smoke.mjs
          node tests/public-api-freeze.mjs
          node tests/core-capability-domain-barrels-smoke.mjs
          npm test
          } 2>&1 | tee /tmp/core-presentation-domain.log

      - name: Commit core presentation domain
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .agent/core-presentation-domain/workflow-error.log
          git add -A
          git commit -m "Add optional core presentation domain"
          git push origin HEAD:main

      - name: Record failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .agent/core-presentation-domain
          cp /tmp/core-presentation-domain.log .agent/core-presentation-domain/workflow-error.log 2>/dev/null || echo "workflow failed before log creation" > .agent/core-presentation-domain/workflow-error.log
          git add .agent/core-presentation-domain/workflow-error.log
          git commit -m "Record core presentation domain failure" || true
          git push origin HEAD:main || true
