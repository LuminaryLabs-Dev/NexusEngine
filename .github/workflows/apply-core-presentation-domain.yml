          cat > src/core-domains/core-presentation-domain/README.md <<'MD'
          # Core Presentation Domain

          `n:presentation` is an optional promoted domain family for visual applications.

          ```txt
          host measures the platform
          -> presentation-output determines viewport and render policy
          -> ui-scale determines reference-resolution scale
          -> camera-framing fits subjects to the active viewport
          -> renderer adapter applies descriptors
          ```

          It is not installed automatically. Browser, desktop, mobile, and editor hosts should opt in. Headless simulations and dedicated servers can omit it.

          The domain is renderer-neutral. DOM measurement and Three.js mutation live in adapters outside domain state.
          MD

          cat > src/hosts/browser/browser-presentation-surface-adapter.js <<'JS'
          const finite = (value, fallback = 0) => Number.isFinite(Number(value)) ? Number(value) : fallback;

          function createSafeAreaProbe(documentRef) {
            if (!documentRef?.createElement || !documentRef.body) return null;
            const probe = documentRef.createElement("div");
            Object.assign(probe.style, {
              position: "fixed",
              inset: "0",
              pointerEvents: "none",
              visibility: "hidden",
              paddingTop: "env(safe-area-inset-top)",
              paddingRight: "env(safe-area-inset-right)",
              paddingBottom: "env(safe-area-inset-bottom)",
              paddingLeft: "env(safe-area-inset-left)"
            });
            documentRef.body.append(probe);
            return probe;
          }

          export function createBrowserPresentationSurfaceAdapter(options = {}) {
            const element = options.element;
            if (!element) throw new TypeError("Browser presentation surface adapter requires an element.");
            const windowRef = options.window ?? globalThis.window ?? null;
            const documentRef = options.document ?? globalThis.document ?? null;
            const ResizeObserverRef = options.ResizeObserver ?? globalThis.ResizeObserver;
            const onChange = typeof options.onChange === "function" ? options.onChange : () => {};
            const surfaceId = String(options.surfaceId ?? "main");
            let observer = null;
            let probe = null;
            let started = false;
            let lastSurface = null;
            let lastSignature = "";

            const safeInsets = () => {
              if (typeof options.getSafeInsets === "function") return options.getSafeInsets();
              probe ??= createSafeAreaProbe(documentRef);
              if (!probe || !windowRef?.getComputedStyle) return { top: 0, right: 0, bottom: 0, left: 0 };
              const style = windowRef.getComputedStyle(probe);
              return {
                top: finite(style.paddingTop, 0),
                right: finite(style.paddingRight, 0),
                bottom: finite(style.paddingBottom, 0),
                left: finite(style.paddingLeft, 0)
              };
            };

            const measure = () => {
              const rect = element.getBoundingClientRect?.() ?? {};
              const cssWidth = Math.max(0, finite(rect.width, finite(element.clientWidth, finite(windowRef?.visualViewport?.width, windowRef?.innerWidth ?? 0))));
              const cssHeight = Math.max(0, finite(rect.height, finite(element.clientHeight, finite(windowRef?.visualViewport?.height, windowRef?.innerHeight ?? 0))));
              return {
                surfaceId,
                cssWidth,
                cssHeight,
                pixelRatio: Math.max(0.1, finite(windowRef?.devicePixelRatio, 1)),
                safeInsets: safeInsets(),
                orientation: cssWidth >= cssHeight ? "landscape" : "portrait",
                fullscreen: Boolean(documentRef?.fullscreenElement),
                visible: documentRef?.visibilityState !== "hidden"
              };
            };

            const emit = () => {
              const surface = measure();
              const signature = JSON.stringify(surface);
              lastSurface = surface;
              if (signature === lastSignature) return surface;
              lastSignature = signature;
              onChange(structuredClone(surface));
              return surface;
            };

            const start = () => {
              if (started) return lastSurface ?? emit();
              started = true;
              if (typeof ResizeObserverRef === "function") {
                observer = new ResizeObserverRef(emit);
                observer.observe(element);
              }
              windowRef?.addEventListener?.("resize", emit);
              windowRef?.visualViewport?.addEventListener?.("resize", emit);
              windowRef?.visualViewport?.addEventListener?.("scroll", emit);
              documentRef?.addEventListener?.("fullscreenchange", emit);
              documentRef?.addEventListener?.("visibilitychange", emit);
              return emit();
            };

            const stop = () => {
              if (!started) return;
              started = false;
              observer?.disconnect?.();
              observer = null;
              windowRef?.removeEventListener?.("resize", emit);
              windowRef?.visualViewport?.removeEventListener?.("resize", emit);
              windowRef?.visualViewport?.removeEventListener?.("scroll", emit);
              documentRef?.removeEventListener?.("fullscreenchange", emit);
              documentRef?.removeEventListener?.("visibilitychange", emit);
              probe?.remove?.();
              probe = null;
            };

            const api = Object.freeze({ start, stop, measure, emit, getSurface: () => structuredClone(lastSurface) });
            if (options.autoStart !== false) start();
            return api;
          }
