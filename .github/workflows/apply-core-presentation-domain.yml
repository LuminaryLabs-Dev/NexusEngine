name: Apply core presentation domain

on:
  push:
    branches: [main]
    paths:
      - .agent/apply-core-presentation-domain

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add optional core presentation domain
        shell: bash
        run: |
          set -o pipefail
          {
          set -euo pipefail
          mkdir -p \
            src/core-domains/core-presentation-domain \
            src/core-kits/core-presentation-kit \
            src/core-kits/core-presentation-output-kit \
            src/core-kits/core-ui-scale-kit \
            src/core-kits/core-camera-framing-kit \
            src/hosts/browser \
            src/renderers/three \
            tests/core-kits

          cat > src/core-domains/core-presentation-domain/contracts.js <<'JS'
          export const PRESENTATION_FRAME_MODES = Object.freeze([
            "native",
            "contain",
            "cover",
            "width",
            "height",
            "stretch",
            "safe-contain"
          ]);

          export const UI_SCALE_MODES = Object.freeze([
            "constant",
            "match-width",
            "match-height",
            "match-shortest-side",
            "match-longest-side",
            "expand",
            "shrink"
          ]);

          export const CAMERA_PROJECTIONS = Object.freeze(["perspective", "orthographic"]);

          export const DEFAULT_PRESENTATION_OUTPUT_POLICY = Object.freeze({
            referenceAspect: 16 / 9,
            frameMode: "native",
            renderScale: 1,
            minimumRenderScale: 0.5,
            maximumRenderScale: 1,
            maximumPixelRatio: 2,
            barColor: "#000000"
          });

          export const DEFAULT_UI_SCALE_POLICY = Object.freeze({
            referenceWidth: 1920,
            referenceHeight: 1080,
            mode: "match-shortest-side",
            match: 0.5,
            constantScale: 1,
            minimumScale: 0.5,
            maximumScale: 2
          });

          export const DEFAULT_CAMERA_FRAMING_POLICY = Object.freeze({
            padding: 1.18,
            smoothTime: 0.18,
            minimumDistance: 0.1,
            maximumDistance: 1000,
            teleportThreshold: 50,
            nearPadding: 0.5,
            farPadding: 4,
            preferredDirection: [0.72, 0.32, 1]
          });
          JS

          cat > src/core-kits/core-presentation-kit/index.js <<'JS'
          import { defineEvent, defineResource } from "../../ecs.js";
          import { defineDomainServiceKit } from "../../domain-service-kit.js";

          const VERSION = "0.0.3";
          const State = defineResource("core.presentation.state");
          const Configured = defineEvent("core.presentation.configured");
          const Reset = defineEvent("core.presentation.reset");
          const SnapshotLoaded = defineEvent("core.presentation.snapshot-loaded");

          const clone = (value) => value === undefined ? undefined : structuredClone(value);

          function initialState(config = {}) {
            return {
              version: VERSION,
              status: "ready",
              optional: true,
              sequence: 0,
              config: clone(config.config ?? {}),
              graph: {
                root: "n:presentation",
                output: "n:presentation:output",
                uiScale: "n:presentation:ui-scale",
                cameraFraming: "n:presentation:camera-framing"
              }
            };
          }

          export function createCorePresentationKit(config = {}) {
            return defineDomainServiceKit({
              id: config.id ?? "core-presentation-domain",
              domain: "presentation",
              domainPath: "n:presentation",
              apiName: config.apiName ?? "corePresentation",
              version: VERSION,
              stability: "stable-candidate",
              services: ["composition", "snapshot"],
              resources: { State },
              events: { Configured, Reset, SnapshotLoaded },
              metadata: {
                purpose: "Optional parent domain for renderer-neutral output, UI scaling, and camera framing policy.",
                owns: ["presentation domain composition", "presentation capability graph"],
                doesNotOwn: ["canvas creation", "DOM layout", "renderer objects", "platform measurement"],
                rendererAgnostic: true,
                deterministic: true,
                optional: true,
                snapshot: true,
                reset: true
              },
              initWorld({ world }) {
                world.setResource(State, initialState(config));
              },
              createApi({ world }) {
                const setState = (state, event, payload = {}) => {
                  world.setResource(State, state);
                  world.emit(event, { state: clone(state), ...clone(payload) });
                  return clone(state);
                };
                return {
                  getGraph: () => clone(world.getResource(State).graph),
                  getState: () => clone(world.getResource(State)),
                  getSnapshot: () => clone(world.getResource(State)),
                  configure(patch = {}) {
                    const current = world.getResource(State);
                    return setState({
                      ...current,
                      sequence: current.sequence + 1,
                      config: { ...current.config, ...clone(patch) }
                    }, Configured, { patch });
                  },
                  loadSnapshot(snapshot = {}) {
                    const next = { ...initialState(config), ...clone(snapshot), version: VERSION, status: "ready" };
                    return setState(next, SnapshotLoaded);
                  },
                  reset() {
                    return setState(initialState(config), Reset);
                  }
                };
              }
            });
          }
          JS

          cat > src/core-kits/core-presentation-output-kit/math.js <<'JS'
          import {
            DEFAULT_PRESENTATION_OUTPUT_POLICY,
            PRESENTATION_FRAME_MODES
          } from "../../core-domains/core-presentation-domain/contracts.js";

          const finite = (value, fallback = 0) => Number.isFinite(Number(value)) ? Number(value) : fallback;
          const positive = (value, fallback = 1) => Math.max(0, finite(value, fallback));
          const clamp = (value, minimum, maximum) => Math.min(maximum, Math.max(minimum, value));

          export function normalizePresentationSurface(input = {}) {
            const cssWidth = positive(input.cssWidth ?? input.width, 0);
            const cssHeight = positive(input.cssHeight ?? input.height, 0);
            const pixelRatio = Math.max(0.01, finite(input.pixelRatio, 1));
            const sourceInsets = input.safeInsets ?? {};
            const safeInsets = {
              top: positive(sourceInsets.top, 0),
              right: positive(sourceInsets.right, 0),
              bottom: positive(sourceInsets.bottom, 0),
              left: positive(sourceInsets.left, 0)
            };
            return {
              surfaceId: String(input.surfaceId ?? "main"),
              cssWidth,
              cssHeight,
              pixelRatio,
              safeInsets,
              orientation: input.orientation ?? (cssWidth >= cssHeight ? "landscape" : "portrait"),
              fullscreen: input.fullscreen === true,
              visible: input.visible !== false
            };
          }

          export function normalizePresentationPolicy(input = {}) {
            const frameMode = PRESENTATION_FRAME_MODES.includes(input.frameMode)
              ? input.frameMode
              : DEFAULT_PRESENTATION_OUTPUT_POLICY.frameMode;
            const minimumRenderScale = Math.max(0.01, finite(input.minimumRenderScale, DEFAULT_PRESENTATION_OUTPUT_POLICY.minimumRenderScale));
            const maximumRenderScale = Math.max(minimumRenderScale, finite(input.maximumRenderScale, DEFAULT_PRESENTATION_OUTPUT_POLICY.maximumRenderScale));
            return {
              referenceAspect: Math.max(0.01, finite(input.referenceAspect, DEFAULT_PRESENTATION_OUTPUT_POLICY.referenceAspect)),
              frameMode,
              renderScale: clamp(finite(input.renderScale, DEFAULT_PRESENTATION_OUTPUT_POLICY.renderScale), minimumRenderScale, maximumRenderScale),
              minimumRenderScale,
              maximumRenderScale,
              maximumPixelRatio: Math.max(0.1, finite(input.maximumPixelRatio, DEFAULT_PRESENTATION_OUTPUT_POLICY.maximumPixelRatio)),
              barColor: typeof input.barColor === "string" ? input.barColor : DEFAULT_PRESENTATION_OUTPUT_POLICY.barColor
            };
          }

          export function calculateSafeRect(surfaceInput = {}) {
            const surface = normalizePresentationSurface(surfaceInput);
            const width = Math.max(0, surface.cssWidth - surface.safeInsets.left - surface.safeInsets.right);
            const height = Math.max(0, surface.cssHeight - surface.safeInsets.top - surface.safeInsets.bottom);
            return {
              x: Math.min(surface.cssWidth, surface.safeInsets.left),
              y: Math.min(surface.cssHeight, surface.safeInsets.top),
              width,
              height
            };
          }

          function centerRect(container, width, height) {
            return {
              x: container.x + (container.width - width) * 0.5,
              y: container.y + (container.height - height) * 0.5,
              width,
              height
            };
          }

          export function calculateViewport(containerInput = {}, policyInput = {}) {
            const container = {
              x: finite(containerInput.x, 0),
              y: finite(containerInput.y, 0),
              width: positive(containerInput.width, 0),
              height: positive(containerInput.height, 0)
            };
            const policy = normalizePresentationPolicy(policyInput);
            if (container.width <= 0 || container.height <= 0) return { ...container, width: 0, height: 0 };
            const aspect = policy.referenceAspect;
            const currentAspect = container.width / container.height;

            if (policy.frameMode === "native" || policy.frameMode === "stretch") return { ...container };
            if (policy.frameMode === "width") {
              return centerRect(container, container.width, container.width / aspect);
            }
            if (policy.frameMode === "height") {
              return centerRect(container, container.height * aspect, container.height);
            }
            if (policy.frameMode === "cover") {
              return currentAspect > aspect
                ? centerRect(container, container.width, container.width / aspect)
                : centerRect(container, container.height * aspect, container.height);
            }
            return currentAspect > aspect
              ? centerRect(container, container.height * aspect, container.height)
              : centerRect(container, container.width, container.width / aspect);
          }

          export function intersectRects(left, right) {
            const x = Math.max(left.x, right.x);
            const y = Math.max(left.y, right.y);
            const rightEdge = Math.min(left.x + left.width, right.x + right.width);
            const bottomEdge = Math.min(left.y + left.height, right.y + right.height);
            return {
              x,
              y,
              width: Math.max(0, rightEdge - x),
              height: Math.max(0, bottomEdge - y)
            };
          }

          export function calculateBars(surfaceRect, viewport) {
            return {
              top: Math.max(0, viewport.y - surfaceRect.y),
              right: Math.max(0, surfaceRect.x + surfaceRect.width - (viewport.x + viewport.width)),
              bottom: Math.max(0, surfaceRect.y + surfaceRect.height - (viewport.y + viewport.height)),
              left: Math.max(0, viewport.x - surfaceRect.x)
            };
          }

          export function calculateRenderSize(surfaceInput = {}, policyInput = {}) {
            const surface = normalizePresentationSurface(surfaceInput);
            const policy = normalizePresentationPolicy(policyInput);
            const pixelRatio = Math.min(surface.pixelRatio, policy.maximumPixelRatio) * policy.renderScale;
            return {
              scale: policy.renderScale,
              pixelRatio,
              pixelWidth: Math.max(0, Math.round(surface.cssWidth * pixelRatio)),
              pixelHeight: Math.max(0, Math.round(surface.cssHeight * pixelRatio))
            };
          }

          export function createPresentationDescriptor(surfaceInput = {}, policyInput = {}, revision = 0) {
            const surface = normalizePresentationSurface(surfaceInput);
            const policy = normalizePresentationPolicy(policyInput);
            const surfaceRect = { x: 0, y: 0, width: surface.cssWidth, height: surface.cssHeight };
            const safeRect = calculateSafeRect(surface);
            const fitRect = policy.frameMode === "safe-contain" ? safeRect : surfaceRect;
            const viewport = calculateViewport(fitRect, policy);
            const visibleViewport = intersectRects(surfaceRect, viewport);
            const naturalAspect = viewport.height > 0 ? viewport.width / viewport.height : policy.referenceAspect;
            return {
              kind: "presentation-output",
              surface,
              policy,
              safeRect,
              frame: {
                mode: policy.frameMode,
                aspect: policy.referenceAspect,
                viewport,
                visibleViewport,
                bars: calculateBars(surfaceRect, viewport),
                barColor: policy.barColor
              },
              render: calculateRenderSize(surface, policy),
              cameraAspect: policy.frameMode === "native" ? naturalAspect : policy.referenceAspect,
              revision: Math.max(0, Math.floor(finite(revision, 0)))
            };
          }
          JS

          cat > src/core-kits/core-presentation-output-kit/index.js <<'JS'
          import { defineEvent, defineResource } from "../../ecs.js";
          import { defineDomainServiceKit } from "../../domain-service-kit.js";
          import {
            createPresentationDescriptor,
            normalizePresentationPolicy,
            normalizePresentationSurface
          } from "./math.js";

          export * from "./math.js";

          const VERSION = "0.0.3";
          const Surface = defineResource("core.presentation.surface");
          const Policy = defineResource("core.presentation.policy");
          const Descriptor = defineResource("core.presentation.descriptor");
          const SurfaceChanged = defineEvent("core.presentation.surface-changed");
          const PolicyChanged = defineEvent("core.presentation.policy-changed");
          const OutputChanged = defineEvent("core.presentation.output-changed");
          const Reset = defineEvent("core.presentation.output-reset");
          const SnapshotLoaded = defineEvent("core.presentation.output-snapshot-loaded");
          const clone = (value) => value === undefined ? undefined : structuredClone(value);

          function initial(config = {}) {
            const surface = normalizePresentationSurface(config.surface ?? {});
            const policy = normalizePresentationPolicy(config.policy ?? config);
            return {
              surface,
              policy,
              descriptor: createPresentationDescriptor(surface, policy, 0)
            };
          }

          export function createCorePresentationOutputKit(config = {}) {
            return defineDomainServiceKit({
              id: config.id ?? "core-presentation-output-kit",
              domain: "presentation-output",
              domainPath: "n:presentation:output",
              parentDomainPath: "n:presentation",
              apiName: config.apiName ?? "presentationOutput",
              version: VERSION,
              stability: "stable-candidate",
              services: ["surface-input", "viewport-policy", "render-resolution", "safe-area"],
              resources: { Surface, Policy, Descriptor },
              events: { SurfaceChanged, PolicyChanged, OutputChanged, Reset, SnapshotLoaded },
              metadata: {
                purpose: "Renderer-neutral surface, safe-area, aspect-ratio, viewport, bar, and render-resolution policy.",
                owns: ["surface descriptors", "viewport policy", "safe rectangles", "render resolution descriptors"],
                doesNotOwn: ["DOM measurement", "canvas creation", "renderer mutation", "subject framing"],
                rendererAgnostic: true,
                deterministic: true,
                optional: true,
                snapshot: true,
                reset: true,
                fitModes: ["native", "contain", "cover", "width", "height", "stretch", "safe-contain"]
              },
              initWorld({ world }) {
                const state = initial(config);
                world.setResource(Surface, state.surface);
                world.setResource(Policy, state.policy);
                world.setResource(Descriptor, state.descriptor);
              },
              createApi({ world }) {
                const recompute = (event = OutputChanged) => {
                  const previous = world.getResource(Descriptor);
                  const descriptor = createPresentationDescriptor(
                    world.getResource(Surface),
                    world.getResource(Policy),
                    Number(previous?.revision ?? 0) + 1
                  );
                  world.setResource(Descriptor, descriptor);
                  world.emit(event, { descriptor: clone(descriptor) });
                  if (event !== OutputChanged) world.emit(OutputChanged, { descriptor: clone(descriptor) });
                  return clone(descriptor);
                };
                const reset = () => {
                  const state = initial(config);
                  world.setResource(Surface, state.surface);
                  world.setResource(Policy, state.policy);
                  world.setResource(Descriptor, state.descriptor);
                  world.emit(Reset, { descriptor: clone(state.descriptor) });
                  return clone(state.descriptor);
                };
                return {
                  setSurface(surface = {}) {
                    const normalized = normalizePresentationSurface(surface);
                    world.setResource(Surface, normalized);
                    world.emit(SurfaceChanged, { surface: clone(normalized) });
                    return recompute();
                  },
                  configure(policy = {}) {
                    const normalized = normalizePresentationPolicy({ ...world.getResource(Policy), ...policy });
                    world.setResource(Policy, normalized);
                    world.emit(PolicyChanged, { policy: clone(normalized) });
                    return recompute();
                  },
                  getSurface: () => clone(world.getResource(Surface)),
                  getPolicy: () => clone(world.getResource(Policy)),
                  getDescriptor: () => clone(world.getResource(Descriptor)),
                  getState: () => ({
                    surface: clone(world.getResource(Surface)),
                    policy: clone(world.getResource(Policy)),
                    descriptor: clone(world.getResource(Descriptor))
                  }),
                  getSnapshot() {
                    return this.getState();
                  },
                  loadSnapshot(snapshot = {}) {
                    const surface = normalizePresentationSurface(snapshot.surface ?? {});
                    const policy = normalizePresentationPolicy(snapshot.policy ?? {});
                    const revision = Number(snapshot.descriptor?.revision ?? 0);
                    const descriptor = createPresentationDescriptor(surface, policy, revision);
                    world.setResource(Surface, surface);
                    world.setResource(Policy, policy);
                    world.setResource(Descriptor, descriptor);
                    world.emit(SnapshotLoaded, { descriptor: clone(descriptor) });
                    return clone(descriptor);
                  },
                  reset
                };
              }
            });
          }
