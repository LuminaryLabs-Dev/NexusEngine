name: Regenerate Object Shape Manifest

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/regenerate-object-shape-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Regenerate DSK manifest
        run: node scripts/generate-dsk-manifest.mjs

      - name: Commit generated manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/DSK_MANIFEST_0.0.3.json
          if git diff --cached --quiet; then
            echo "Manifest is already current."
            exit 0
          fi
          git commit -m "docs: publish Core Object Shape manifest entry [skip ci]"
          git push origin HEAD:main
