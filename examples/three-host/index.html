<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus.Host Three Descriptor Example</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101317;
        color: #ecf2f8;
      }

      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      #viewport {
        min-height: 0;
      }

      #status {
        display: grid;
        gap: 4px;
        padding: 10px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: #151a20;
        font-size: 13px;
      }

      code {
        color: #a9d6ff;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="viewport" aria-label="Three.js descriptor viewport"></main>
    <section id="status">
      <div><strong>Nexus.Host Three Descriptor Example</strong></div>
      <div id="details">Loading descriptor stream...</div>
    </section>
    <script type="module">
      import * as THREE from "three";
      import {
        createDescriptorHash,
        createThreeHostDescriptorSnapshot
      } from "./descriptor-snapshot.mjs";

      const snapshot = createThreeHostDescriptorSnapshot();
      const viewport = document.querySelector("#viewport");
      const details = document.querySelector("#details");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101317);

      const cameraDescriptor = snapshot.render.camera;
      const camera = new THREE.PerspectiveCamera(
        cameraDescriptor.fov,
        Math.max(1, viewport.clientWidth) / Math.max(1, viewport.clientHeight),
        cameraDescriptor.near,
        cameraDescriptor.far
      );
      camera.position.fromArray(cameraDescriptor.position);
      camera.lookAt(new THREE.Vector3().fromArray(cameraDescriptor.target));

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      viewport.appendChild(renderer.domElement);

      const materials = new Map();
      for (const material of snapshot.render.materials) {
        materials.set(material.id, new THREE.MeshStandardMaterial({
          color: material.baseColor,
          roughness: material.roughness,
          metalness: material.metallic,
          transparent: material.alpha < 1,
          opacity: material.alpha
        }));
      }

      for (const light of snapshot.render.lights) {
        if (light.kind === "ambient") {
          scene.add(new THREE.AmbientLight(light.color, light.intensity));
        }
        if (light.kind === "directional") {
          const directional = new THREE.DirectionalLight(light.color, light.intensity);
          const direction = new THREE.Vector3().fromArray(light.direction).normalize();
          directional.position.set(-direction.x * 4, -direction.y * 4, -direction.z * 4);
          scene.add(directional);
        }
      }

      function makeGeometry(mesh) {
        if (mesh.kind === "plane") {
          return new THREE.PlaneGeometry(mesh.size[0], mesh.size[1]);
        }
        return new THREE.BoxGeometry(mesh.size[0], mesh.size[1], mesh.size[2]);
      }

      for (const mesh of snapshot.render.meshes) {
        const object = new THREE.Mesh(
          makeGeometry(mesh),
          materials.get(mesh.materialId) ?? new THREE.MeshNormalMaterial()
        );
        object.name = mesh.id;
        object.position.fromArray(mesh.transform.position);
        object.rotation.set(...mesh.transform.rotation);
        object.scale.fromArray(mesh.transform.scale);
        scene.add(object);
      }

      function resize() {
        const width = Math.max(1, viewport.clientWidth);
        const height = Math.max(1, viewport.clientHeight);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      window.addEventListener("resize", resize);
      resize();

      function frame() {
        renderer.render(scene, camera);
        requestAnimationFrame(frame);
      }
      frame();

      details.innerHTML = [
        `graph <code>${snapshot.graph.id}</code>`,
        `revision <code>${snapshot.render.revision}</code>`,
        `meshes <code>${snapshot.render.meshes.length}</code>`,
        `hash <code>${createDescriptorHash(snapshot)}</code>`
      ].join(" | ");
    </script>
  </body>
</html>
